name: Release to TestFlight

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  testflight:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Show available Xcode versions
        run: ls /Applications | grep Xcode

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Decode App Store Connect API key to file
        env:
          KEY_B64: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
        run: |
          mkdir -p "$RUNNER_TEMP/private_keys"
          printf '%s' "$KEY_B64" | base64 --decode > "$RUNNER_TEMP/private_keys/AuthKey.p8"
          # sanity check
          head -c 30 "$RUNNER_TEMP/private_keys/AuthKey.p8"
          echo
          wc -c "$RUNNER_TEMP/private_keys/AuthKey.p8"

      - name: Build & upload to TestFlight
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          ASC_KEY_FILE: ${{ runner.temp }}/private_keys/AuthKey.p8
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          FASTLANE_SKIP_UPDATE_CHECK: 1
          FASTLANE_HIDE_CHANGELOG: 1
        run: bundle exec fastlane beta
